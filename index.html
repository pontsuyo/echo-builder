<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Dot Meadow</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" href="favicon.ico" />
    <style>
      :root {
        --bg: #0a1421;
        --fg: #e9f2ff;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 15% 15%, #1b3658, var(--bg) 45%);
        color: var(--fg);
        font-family: 'VT323', 'Courier New', 'Menlo', monospace;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      #wrap {
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      canvas {
        width: min(96vw, 1280px);
        aspect-ratio: 16 / 9;
        max-height: 92vh;
        image-rendering: pixelated;
        border: 3px solid #5b6a8a;
        background: #081327;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
      }

      .hint {
        font-size: 14px;
        color: #a7bfdc;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
      }

      button {
        border: 1px solid #44567c;
        background: #1c2e4b;
        color: #d9e6ff;
        padding: 4px 8px;
        cursor: pointer;
      }

      /* テストボタン用スタイル */
      .test-button {
        border: 1px solid #8b5cf6;
        background: #3b1c66;
        color: #f0e0ff;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="game" width="640" height="360"></canvas>
      <div class="toolbar">
        <button id="toggle-command-result">結果確認</button>
        <button id="ask-voxtral-mic">マイク開始</button>
        <button id="test-red-roof" class="test-button">テスト:赤い屋根</button>
        <button id="test-two-windows" class="test-button">テスト:窓2つ</button>
        <button id="test-two-dots" class="test-button">テスト:2つのドット</button>
        <span class="hint">←→で移動 / Zでジャンプ / Rでリトライ / M:マイク開始・停止</span>
      </div>
    </div>
    <!-- ローカルでのみ開発向け設定 -->
    <script>
      // Voxtral/APIキーはブラウザ直書き禁止（開発はローカルプロキシ経由）
      window.__MISTRAL_PROXY_URL = 'http://127.0.0.1:8001';
      window.__MISTRAL_PROXY_AUDIO_URL = 'http://127.0.0.1:8001';
      window.__MISTRAL_API_MODEL = 'mistral-small-latest';
      window.__MISTRAL_AUDIO_TRANSCRIPT_MODEL = 'voxtral-mini-latest';
      window.__MISTRAL_DEBUG = true;
    </script>
    <script src="voxtral.js?v=3" defer></script>
    <script src="game-data.js?v=8" defer></script>
    <script src="game-commands.js?v=8" defer></script>
    <script src="game-engine.js?v=8" defer></script>
  </body>
</html>
