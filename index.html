<!doctype html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo Builder</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" href="favicon.ico" />
    <style>
      :root {
        --bg: #0a1421;
        --fg: #e9f2ff;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 15% 15%, #1b3658, var(--bg) 45%);
        color: var(--fg);
        font-family: 'VT323', 'Courier New', 'Menlo', monospace;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        position: relative;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 16%, rgba(170, 212, 255, 0.14), transparent 60%);
        opacity: 0.2;
      }

      #wrap {
        display: grid;
        gap: 10px;
        justify-items: center;
        position: relative;
        z-index: 1;
      }

      .stage-shell {
        width: min(96vw, 1280px);
        position: relative;
        filter: none;
      }

      .stage-shell::before {
        content: '';
        display: none;
        pointer-events: none;
      }

      .stage-frame {
        position: relative;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .stage-frame::before {
        content: '';
        display: none;
        pointer-events: none;
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        image-rendering: auto;
        border: 3px solid #5b6a8a;
        background: #081327;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
      }

      .frame-corner {
        display: none;
        pointer-events: none;
      }

      .hint {
        font-size: 14px;
        color: #a7bfdc;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
      }

      button {
        border: 1px solid #44567c;
        background: #1c2e4b;
        color: #d9e6ff;
        padding: 4px 8px;
        cursor: pointer;
      }

      .overlay-controls {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 20;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .debug-button {
        border: 1px solid #44567c;
        background: #1c2e4b;
        color: #d9e6ff;
      }

      .speech-toggle-button {
        min-width: 34px;
        text-align: center;
      }

      .python-toggle-button {
        min-width: 140px;
      }

      /* テストボタン用スタイル */
      .test-button {
        border: 1px solid #8b5cf6;
        background: #3b1c66;
        color: #f0e0ff;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="overlay-controls">
      <button id="toggle-debug-overlay" class="debug-button">debug info: OFF</button>
      <button id="toggle-test-buttons" class="debug-button">debug button: ON</button>
      <button
        id="toggle-child-speech"
        class="debug-button speech-toggle-button"
        title="Toggle Child Speech: ON/OFF"
        aria-label="Toggle child speech"
      >
        🔊
      </button>
    </div>

    <div id="wrap">
      <div class="stage-shell">
        <div class="stage-frame">
          <canvas id="game" width="640" height="360"></canvas>
          <span class="frame-corner frame-corner-tl" aria-hidden="true"></span>
          <span class="frame-corner frame-corner-tr" aria-hidden="true"></span>
          <span class="frame-corner frame-corner-bl" aria-hidden="true"></span>
          <span class="frame-corner frame-corner-br" aria-hidden="true"></span>
        </div>
      </div>
      <div class="toolbar">
        <button id="toggle-audio-send" class="debug-button python-toggle-button" title="Toggle voice audio upload to Python proxy">
          Python送信: ON
        </button>
        <button id="toggle-command-result">Command Log</button>
        <button id="ask-voxtral-mic">START</button>
        <button id="test-red-roof" class="test-button">Test: Red Roof</button>
        <button id="test-two-windows" class="test-button">Test: Two Windows</button>
        <button id="test-two-dots" class="test-button">Test: two windows?</button>
        <span class="hint">Press R to retry / M: START</span>
      </div>
    </div>
    <!-- ローカルでのみ開発向け設定 -->
    <script>
      // Voxtral/APIキーはブラウザ直書き禁止（開発はローカルプロキシ経由）
      window.__MISTRAL_PROXY_URL = 'http://127.0.0.1:8001';
      window.__MISTRAL_PROXY_AUDIO_URL = 'http://127.0.0.1:8001';
      window.__ELEVENLABS_PROXY_URL = 'http://127.0.0.1:8001';
      window.__ELEVENLABS_TTS_MODEL_ID = 'eleven_multilingual_v2';
      window.__ELEVENLABS_TTS_OUTPUT_FORMAT = 'mp3_44100_128';
      window.__ELEVENLABS_TTS_ENABLED = false;
      window.__MISTRAL_DEBUG = true;
    </script>
    <script src="voxtral.js?v=3" defer></script>
    <script src="voxtral-ui.js?v=1" defer></script>
    <script src="game-data.js?v=8" defer></script>
    <script src="game-commands.js?v=8" defer></script>
    <script src="game-engine.js?v=8" defer></script>
  </body>
</html>
