<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Dot Action (No Framework)</title>
    <style>
      :root {
        --bg: #101218;
        --fg: #eef2ff;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: 'Courier New', monospace;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      #wrap {
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      canvas {
        width: min(92vw, 960px);
        height: min(52vw, 540px);
        max-height: 92vh;
        image-rendering: pixelated;
        border: 2px solid #2e3440;
        background: #222831;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }

      .hint {
        font-size: 12px;
        color: #9aa4bc;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="game" width="640" height="360"></canvas>
      <div class="hint">←→で移動 / Zでジャンプ / Rでリトライ / 画面に表示される赤い敵を避ける</div>
    </div>
    <script src="game.js" defer></script>
  </body>
</html>
