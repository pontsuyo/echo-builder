<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Dot Action (No Framework)</title>
    <style>
      :root {
        --bg: #101218;
        --fg: #eef2ff;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: 'Courier New', monospace;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      #wrap {
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      canvas {
        width: min(92vw, 960px);
        height: min(52vw, 540px);
        max-height: 92vh;
        image-rendering: pixelated;
        border: 2px solid #2e3440;
        background: #222831;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }

      .hint {
        font-size: 12px;
        color: #9aa4bc;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button {
        border: 1px solid #3b4252;
        background: #1f2533;
        color: #d5ddf2;
        padding: 4px 8px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="game" width="640" height="360"></canvas>
      <div class="toolbar">
        <button id="ask-voxtral-mic">マイク開始</button>
        <span class="hint">←→で移動 / Zでジャンプ / Rでリトライ / M:マイク開始・停止</span>
      </div>
    </div>
    <!-- ローカルでのみ開発向け設定 -->
    <script>
      // Voxtral/APIキーはブラウザ直書き禁止（開発はローカルプロキシ経由）
      window.__MISTRAL_PROXY_URL = 'http://127.0.0.1:8001';
      window.__MISTRAL_API_MODEL = 'mistral-small-latest';
      window.__MISTRAL_AUDIO_TRANSCRIPT_MODEL = 'voxtral-mini-latest';
      window.__MISTRAL_DEBUG = true; // 詳細ログ
    </script>
    <script src="voxtral.js?v=3" defer></script>
    <script src="game.js?v=2" defer></script>
  </body>
</html>
